name: Generate SDK (spec change merged)

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force generation of SDK
        type: boolean
        default: false
      set_version:
        description: Optionally set a specific SDK version
        type: string
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - .speakeasy/in.openapi.yaml

jobs:
  generate:
    if: github.event.pull_request.merged == true
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      pr_creation_pat: ${{ secrets.SDK_MERGE_PAT }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  generate-fallback:
    needs: generate
    if: failure()
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version }}
    secrets:
      github_access_token: ${{ secrets.SDK_MERGE_PAT }}
      pr_creation_pat: ${{ secrets.SDK_MERGE_PAT }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
